<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Brief.io | Team Directory</title>
        <link rel="stylesheet" href="styles.css">
        <script type="module" src="./js/app.js"></script>

    </head>

    <body>

        <!-- Container For Header -->

        <div id="header-container">

            <!-- Header -->

            <img src="./assets/images/burgundy-placeholder-logo.png" id="header-logo" alt="Placeholder Logo">
            
            <header id="header">

                <button id="invite-member-button">Invite Member</button>

            </header>

        </div>

            <!-- Main Section For Search Bar & Team Members -->

            <main>

                <input type="search" id="search-bar" placeholder="Search by team member name."/>

                <div id="team-member-container">



                </div>

            </main>
        
        <!-- Modal Container For Profiles -->

        <div id="profile-modal-container" style="display: none;">

            <div id="profile-container">

                <button id="profile-close-button">Close</button>

            </div>

        </div>
        
        <!-- Invite A Team Member Feature -->
         
        <div id="invite-modal-container" style="display: none;">

            <div id="invite-form-container">

                <button id="invite-close-button">Close</button>

                <form id="invite-form">

                    <input type="text" id="first-name" placeholder="Enter team member's first name"/>
                    <input type="text" id="last-name" placeholder="Enter team member's last name"/>
                    <input type="email" id="email" placeholder="Enter team member's work email"/>
                    <input type="text" id="job-title" placeholder="Enter team member's job title"/>

                    <button id="submit-invite-button">Submit Invite</button>

                </form>

            </div>
            
        </div>
                   
    </body>

</html>
